<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 17th Birthday Dylan!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bungee {
            font-family: 'Bungee', cursive;
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f2d74e;
            top: -10px;
            z-index: 0;
            animation: fall 3s linear infinite;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .video-container {
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 8px solid white;
            border-radius: 1rem;
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 relative">
    <!-- Confetti Elements -->
    <div id="confetti-container"></div>

    <div class="max-w-4xl w-full glass p-8 md:p-12 rounded-3xl text-white text-center z-10 relative overflow-hidden">
        <!-- Floating Balloons (Visual decoration) -->
        <div class="absolute -top-10 -left-10 text-6xl floating" style="animation-delay: 0s;">🎈</div>
        <div class="absolute -top-10 -right-10 text-6xl floating" style="animation-delay: 2s;">🎉</div>
        <div class="absolute -bottom-10 -left-10 text-6xl floating" style="animation-delay: 1s;">🎂</div>
        <div class="absolute -bottom-10 -right-10 text-6xl floating" style="animation-delay: 3s;">✨</div>

        <header class="mb-8">
            <h1 class="bungee text-5xl md:text-7xl mb-4 tracking-tighter animate-bounce">
                HAPPY 17th BIRTHDAY <br>
                <span class="text-yellow-300">DYLAN!</span>
            </h1>
            <p class="text-xl md:text-2xl font-light opacity-90">A special message just for you from the legend himself...</p>
        </header>

        <div class="video-container overflow-hidden bg-black mb-8 group relative">
            <video 
                class="w-full h-auto max-h-[600px] block" 
                controls 
                poster="https://images.unsplash.com/photo-1530103043960-ef38714abb15?auto=format&fit=crop&w=1200&q=80"
            >
                <source src="video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <footer class="space-y-4">
            <div class="inline-block bg-yellow-400 text-indigo-900 font-bold px-6 py-2 rounded-full text-lg uppercase tracking-widest">
                BERTIE FROM VIRGIN ISLAND SAYS HI!
            </div>
            <p class="text-lg italic opacity-80 mt-6">
                "17 is a massive year, Dylan. Make it count!"
            </p>
        </header>
    </div>

    <script>
        // Simple Confetti Generator
        const container = document.getElementById('confetti-container');
        const colors = ['#f2d74e', '#95c3de', '#ff9a91', '#f2d74e', '#a2d2ff'];
        
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.animationDelay = Math.random() * 5 + 's';
            confetti.style.opacity = Math.random();
            container.appendChild(confetti);
        }
    </script>
</body>
</html>
